name: Package extension

# Builds a clean install zip from an explicit allowlist of runtime files only
# (no tests, tooling, or design sources can leak in) and attaches it to the
# release. Run automatically when a release is published, or on demand.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version and zip name
        run: |
          set -euo pipefail
          # On a release, take the version from the tag; on a manual run there is
          # no tag, so fall back to manifest.json. Strip any leading "v" either way
          # so the name is always rmx_v<version>.zip (e.g. rmx_v3.2.2.zip).
          if [ "${{ github.event_name }}" = "release" ]; then
            raw="${{ github.event.release.tag_name }}"
          else
            raw="$(jq -r .version manifest.json)"
          fi
          ver="${raw#v}"
          echo "VERSION=$ver" >> "$GITHUB_ENV"
          echo "ZIP=rmx_v${ver}.zip" >> "$GITHUB_ENV"

      - name: Build ${{ env.ZIP }} from allowlist
        run: |
          set -euo pipefail
          staging="$(mktemp -d)"
          mkdir -p "$staging/src" "$staging/media"

          # Runtime files only — mirror manifest.json.
          cp manifest.json options.html options.js "$staging/"
          cp src/config.js src/content.js src/github.js src/messaging.js \
             src/overlay.js src/rm.js src/service-worker.js src/views.js "$staging/src/"
          cp media/icon16.png media/icon32.png media/icon48.png media/icon128.png \
             media/logo-black.png media/logo-white.png "$staging/media/"

          # Zip to a relative name inside staging, then move it out. Passing an
          # absolute output path while cwd is a mktemp dir on another filesystem
          # root makes Info-ZIP write the archive into cwd under its basename and
          # treat the abs path as an input ("name not matched"), so unzip/upload
          # can't find it in the workspace.
          (cd "$staging" && zip -r -X "$ZIP" .)
          mv "$staging/$ZIP" "$GITHUB_WORKSPACE/$ZIP"
          echo "--- packaged contents ---"
          unzip -l "$ZIP"

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: rmx_v${{ env.VERSION }}
          path: ${{ env.ZIP }}

      - name: Attach to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" "$ZIP" --clobber
