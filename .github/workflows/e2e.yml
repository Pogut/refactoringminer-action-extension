name: E2E (live GitHub)

# Real-browser end-to-end tests: load the extension into Chromium and drive the
# live rm-action-test PRs + gh-pages feeds. They depend on the live network and
# GitHub's current markup, so they run on a schedule / on demand (to catch
# GitHub DOM drift) rather than gating every push — the fast offline jsdom suite
# (`npm test`) is the per-commit gate.
on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
